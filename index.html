<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; overflow: hidden; }
        .container { max-width: 500px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Fake Login Page */
        #login-screen { position: absolute; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #login-screen h1 { font-size: 28px; color: #fff; margin-bottom: 10px; font-weight: 300; }
        #login-screen p { color: #8e8e8e; margin-bottom: 30px; font-size: 14px; }
        .login-input { width: 85%; padding: 12px; background: #121212; border: 1px solid #363636; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; }
        .login-btn { width: 85%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* SOS Movable Button */
        #sos-btn {
            position: absolute; top: 80px; right: 20px; width: 45px; height: 45px;
            background: rgba(255, 59, 48, 0.7); color: white; border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; z-index: 9999; touch-action: none;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);
        }

        /* Chat Header */
        #header { padding: 12px 15px; border-bottom: 1px solid #262626; display: flex; align-items: center; background: #000; z-index: 10; }
        .profile-pic { width: 35px; height: 35px; border-radius: 50%; background: #262626; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .user-name { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .edit-icon { font-size: 12px; color: #8e8e8e; }

        /* Messages */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .my-wrapper { align-self: flex-end; align-items: flex-end; }
        .their-wrapper { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .my-msg { background: linear-gradient(135deg, #b026ff, #0d6efd); border-bottom-right-radius: 4px; }
        .their-msg { background-color: #262626; border-bottom-left-radius: 4px; }
        
        .msg-time { font-size: 10px; color: #777; margin-top: 2px; padding: 0 4px; }
        .date-separator { align-self: center; font-size: 11px; color: #8e8e8e; margin: 15px 0 5px 0; font-weight: 500; }
        .sys-msg { align-self: center; background: transparent; color: #8e8e8e; font-size: 12px; padding: 5px; text-align: center; max-width: 90%; }
        .seen-status { font-size: 11px; color: #8e8e8e; align-self: flex-end; margin-top: 2px; margin-bottom: 8px; padding-right: 5px; }

        /* Typing Indicator Area */
        #typing-indicator { display: none; font-size: 12px; color: #8e8e8e; padding: 0 15px 8px 15px; font-style: italic; background: #000; }

        /* Input area */
        #input-area { padding: 10px 15px 30px; background: #000; display: flex; gap: 10px; align-items: center; border-top: 1px solid #262626; }
        #msg-input { flex: 1; padding: 12px 18px; background: #121212; border: 1px solid #363636; border-radius: 25px; color: #fff; outline: none; }
        #send-btn { color: #0095f6; font-weight: 600; background: none; border: none; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div id="sos-btn" onclick="triggerSOS()">SOS</div>

        <div id="login-screen">
            <h1>Scientific Calculator</h1>
            <p>Enter your cloud credentials to sync data</p>
            <input type="text" id="email" class="login-input" placeholder="User ID">
            <input type="password" id="password" class="login-input" placeholder="Access Code">
            <button class="login-btn" onclick="login()">Open Database</button>
        </div>

        <div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
            <div id="header" onclick="changeName()">
                <div class="profile-pic">👤</div>
                <div class="user-name"><span id="display-name">Loading...</span> <span class="edit-icon">✏️</span></div>
            </div>
            <div id="messages"></div>
            <div id="typing-indicator">typing...</div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="Message..." onclick="markAsRead()">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚠️ 1. APNI KEYS YAHAN PASTE KARNA ⚠️ ---
        const firebaseConfig = {
    apiKey: "AIzaSyBCrx5hqoBFAR9VDNJ4opUBp3hTuL3bGJ4",
    authDomain: "secretspace-ca604.firebaseapp.com",
    projectId: "secretspace-ca604",
    storageBucket: "secretspace-ca604.firebasestorage.app",
    messagingSenderId: "440793813496",
    appId: "1:440793813496:web:405615f2dc570b296b460d",
    measurementId: "G-2N4RWH4VK0"
  };
        };

        // --- ⚠️ 2. APNE FAKE EMAILS YAHAN DAALNA ⚠️ ---
        const ARNAV_EMAIL = "ak5940962@gmail.com";      
        const LOVLEEN_EMAIL = "pcw69@secret.com";  

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let otherUserReadTime = null;
        let typingTimer = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('sos-btn').style.display = 'flex';
                loadChatName();
                listenToReadReceipts();
                listenToTyping();
                loadMessages();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
                document.getElementById('sos-btn').style.display = 'none';
            }
        });

        function login() {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                .catch(e => alert("System Error: Access Denied"));
        }

        function triggerSOS() {
            auth.signOut().then(() => {
                window.location.replace("https://www.google.com/search?q=calculator");
            });
        }

        // --- Typing Logic (Smart Debounce) ---
        function setTypingStatus(isTyping) {
            if(!auth.currentUser) return;
            const myTypingKey = auth.currentUser.email === ARNAV_EMAIL ? 'arnavIsTyping' : 'lovleenIsTyping';
            db.collection('settings').doc('typing').set({ [myTypingKey]: isTyping }, {merge: true});
        }

        document.getElementById('msg-input').addEventListener('input', () => {
            if (!typingTimer) {
                setTypingStatus(true); // Pehla letter dabte hi signal bhejo
            }
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                setTypingStatus(false); // 3 second band hone par typing hata do
                typingTimer = null;
            }, 3000);
        });

        function listenToTyping() {
            const otherTypingKey = auth.currentUser.email === ARNAV_EMAIL ? 'lovleenIsTyping' : 'arnavIsTyping';
            db.collection('settings').doc('typing').onSnapshot(doc => {
                if(doc.exists && doc.data()[otherTypingKey]) {
                    document.getElementById('typing-indicator').style.display = 'block';
                } else {
                    document.getElementById('typing-indicator').style.display = 'none';
                }
            });
        }
        // ------------------------------------

        // Rest of the normal functions
        function formatDate(date) {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return "Today";
            if (date.toDateString() === yesterday.toDateString()) return "Yesterday";
            return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function formatTime(date) { return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); }
        
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "just now";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }

        function getFixedName() {
            if(auth.currentUser.email === ARNAV_EMAIL) return "ahrnavsharma";
            if(auth.currentUser.email === LOVLEEN_EMAIL) return "lovleenx";
            return "Someone";
        }

        function changeName() {
            const newName = prompt("Enter new nickname for this chat:");
            if(newName && newName.trim() !== "") {
                const fixedName = getFixedName();
                db.collection('settings').doc('chatInfo').set({ chatName: newName.trim() }, {merge: true});
                db.collection('chats').add({
                    text: `${fixedName} set the name to ${newName.trim()}`, type: "system", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        function loadChatName() {
            db.collection('settings').doc('chatInfo').onSnapshot(doc => {
                if(doc.exists && doc.data().chatName) document.getElementById('display-name').innerText = doc.data().chatName;
                else document.getElementById('display-name').innerText = "Tap to set name";
            });
        }

        function markAsRead() {
            if(!auth.currentUser) return;
            const myKey = auth.currentUser.email === ARNAV_EMAIL ? 'arnavRead' : 'lovleenRead';
            db.collection('settings').doc('receipts').set({ [myKey]: firebase.firestore.FieldValue.serverTimestamp() }, {merge: true});
        }

        function listenToReadReceipts() {
            const otherKey = auth.currentUser.email === ARNAV_EMAIL ? 'lovleenRead' : 'arnavRead';
            db.collection('settings').doc('receipts').onSnapshot(doc => {
                if(doc.exists && doc.data()[otherKey]) {
                    otherUserReadTime = doc.data()[otherKey].toDate();
                    renderMessages();
                }
            });
        }

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if(!text.trim()) return;
            
            // Message send karte hi typing status band kar do
            setTypingStatus(false);
            clearTimeout(typingTimer);
            typingTimer = null;

            db.collection('chats').add({
                text: text, type: "msg", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = "";
            markAsRead();
        }

        let globalMessages = [];
        function loadMessages() {
            db.collection('chats').orderBy('timestamp').onSnapshot(snap => {
                globalMessages = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    if(data.timestamp) globalMessages.push({ id: doc.id, ...data });
                });
                renderMessages();
            });
        }

        function renderMessages() {
            const div = document.getElementById('messages');
            div.innerHTML = '';
            let lastDate = "";
            let lastMyMsgIndex = -1;

            for(let i = globalMessages.length - 1; i >= 0; i--) {
                if(globalMessages[i].type === "msg" && globalMessages[i].sender === auth.currentUser.email) {
                    lastMyMsgIndex = i; break;
                }
            }

            globalMessages.forEach((m, index) => {
                const msgDateObj = m.timestamp.toDate();
                const currentDateStr = formatDate(msgDateObj);
                
                if (currentDateStr !== lastDate) {
                    const dateSep = document.createElement('div');
                    dateSep.className = 'date-separator'; dateSep.innerText = currentDateStr;
                    div.appendChild(dateSep); lastDate = currentDateStr;
                }

                if (m.type === "system") {
                    const el = document.createElement('div');
                    el.className = 'sys-msg'; el.innerText = m.text; div.appendChild(el);
                } else {
                    const isMe = m.sender === auth.currentUser.email;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'msg-wrapper ' + (isMe ? 'my-wrapper' : 'their-wrapper');
                    
                    const bubble = document.createElement('div');
                    bubble.className = 'msg ' + (isMe ? 'my-msg' : 'their-msg'); bubble.innerText = m.text;
                    wrapper.appendChild(bubble);

                    const timeStamp = document.createElement('div');
                    timeStamp.className = 'msg-time'; timeStamp.innerText = formatTime(msgDateObj);
                    wrapper.appendChild(timeStamp);
                    div.appendChild(wrapper);

                    if(isMe && index === lastMyMsgIndex && otherUserReadTime && otherUserReadTime >= msgDateObj) {
                        const seenText = document.createElement('div');
                        seenText.className = 'seen-status'; seenText.innerText = "Seen " + timeAgo(otherUserReadTime);
                        div.appendChild(seenText);
                    }
                }
            });
            div.scrollTop = div.scrollHeight;
        }

        const btn = document.getElementById('sos-btn');
        btn.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            btn.style.left = touch.clientX - 22 + 'px'; btn.style.top = touch.clientY - 22 + 'px'; btn.style.right = 'auto';
        });

        // Enter press karne par message send ho
        document.getElementById('msg-input').addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
