<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Scientific Calculator</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --theme-bg: #000;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        body {
            background: #000;
            color: #fff;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #calc-ui {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #000;
            z-index: 10;
        }

        #display {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            font-size: 65px;
            padding: 20px;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            height: 75px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .num { background: #333; color: white; }
        .op { background: #f1a33c; color: white; }
        .top { background: #a5a5a5; color: black; }
        .zero { grid-column: span 2; border-radius: 40px; }

        #secret-app {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }

        .sos-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 59, 48, 0.9);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 2000;
        }

        #login-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .input-box {
            width: 85%;
            padding: 16px;
            margin-bottom: 12px;
            background: #1c1c1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        .login-btn {
            width: 85%;
            padding: 16px;
            background: #007aff;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        #dm-list-ui {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding-top: var(--safe-top);
        }

        .dm-header {
            padding: 15px 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .settings-btn {
            background: #1c1c1e;
            border: 1px solid #333;
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 14px;
            cursor: pointer;
        }

        .search-container {
            padding: 10px 15px;
            border-bottom: 1px solid #111;
            z-index: 9;
            background: rgba(0,0,0,0.9);
        }

        .search-bar {
            width: 100%;
            padding: 10px 15px;
            background: #1c1c1e;
            border-radius: 15px;
            border: 1px solid #333;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .dm-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #111;
        }

        .dm-pfp {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #333;
            margin-right: 15px;
            object-fit: cover;
        }

        .dm-dot {
            width: 10px;
            height: 10px;
            background: #007aff;
            border-radius: 50%;
            display: none;
        }

        #chat-ui {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: var(--theme-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        #chat-header {
            padding: calc(var(--safe-top) + 10px) 15px 12px;
            border-bottom: 1px solid #262626;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 10;
            justify-content: flex-start;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: rgba(0,0,0,0.5);
        }

        .msg-wrap {
            display: flex;
            width: 100%;
        }

        .msg-wrap.me {
            justify-content: flex-end;
        }

        .msg-wrap.them {
            justify-content: flex-start;
        }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 82%;
            min-width: 0;
        }

        .msg-wrap.me .msg-row {
            flex-direction: row-reverse;
        }

        .msg-content {
            display: inline-flex;
            flex-direction: column;
            width: auto;
            max-width: 100%;
            min-width: 0;
        }

        .msg-wrap.me .msg-content {
            align-items: flex-end;
        }

        .msg-wrap.them .msg-content {
            align-items: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.35;
            word-break: break-word;
            white-space: pre-wrap;
            display: inline-block;
            width: fit-content;
            max-width: min(78vw, 320px);
            min-width: 0;
            cursor: pointer;
            position: relative;
        }

        .bubble-me {
            background: #3797f0;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bubble-them {
            background: #262626;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .chat-img {
            display: block;
            max-width: min(60vw, 220px);
            width: auto;
            height: auto;
            border-radius: 12px;
            object-fit: cover;
        }

        .msg-footer {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg-wrap.me .msg-footer { text-align: right; }
        .msg-wrap.them .msg-footer { text-align: left; }

        .react-badge {
            position: absolute;
            bottom: -12px;
            background: #1c1c1e;
            border: 1px solid #333;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .react-me { right: 10px; }
        .react-them { left: 10px; }

        #typing-ind {
            padding: 5px 15px;
            font-size: 12px;
            color: #aaa;
            font-style: italic;
            display: none;
            background: rgba(0,0,0,0.5);
        }

        #input-bar {
            padding: 10px 15px calc(var(--safe-bottom) + 10px);
            display: flex;
            gap: 10px;
            border-top: 1px solid #262626;
            background: rgba(0,0,0,0.9);
            z-index: 10;
            align-items: center;
        }

        #msg-in {
            flex: 1;
            padding: 12px 18px;
            background: #1c1c1e;
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        #react-tray {
            display: none;
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #262626;
            padding: 15px;
            border-radius: 20px;
            flex-direction: column;
            gap: 12px;
            z-index: 3000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            min-width: 250px;
        }

        .emoji-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .react-emoji {
            font-size: 26px;
            cursor: pointer;
            transition: 0.2s;
        }

        .react-emoji:active { transform: scale(1.3); }

        .unsend-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            border-top: 1px solid #444;
            padding-top: 12px;
        }

        #settings-ui {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;

        .set-box {
            width: 90%;
            background: #1c1c1e;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: left;

            width: 100%;
            padding: 12px;
            background: #333;
            color: white;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .delete-chat-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid #ff3b30;
            color: #ff3b30;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
        }
    </style>
</head>
<body>

            <button class="btn num" onclick="press('4')">4</button><button class="btn num" onclick="press('5')">5</button><button class="btn num" onclick="press('6')">6</button><button class="btn op" onclick="press('-')">-</button>
            <button class="btn num" onclick="press('1')">1</button><button class="btn num" onclick="press('2')">2</button><button class="btn num" onclick="press('3')">3</button><button class="btn op" onclick="press('+')">+</button>

    <script>
        let exp = '0';
        let taps = 0;
        let lastTap = 0;

        function update() {
            document.getElementById('display').innerText = exp;
        }

        function press(v) {
            if (exp === '0' && v !== '.') exp = v;
            else exp += v;
            update();
        }

        function equal() {
            try {
                exp = Function('"use strict"; return (' + exp + ')')().toString();
                update();
            } catch (e) {
                exp = 'Error';
                update();
            }
        }

        function handleAC() {
            let now = Date.now();
            if (now - lastTap < 600) taps++;
            else taps = 1;
            lastTap = now;

            if (taps === 3) {
                document.getElementById('secret-app').style.display = 'flex';
                document.getElementById('calc-ui').style.display = 'none';
                taps = 0;
            }
            exp = '0';
            update();
        }

        const SUPABASE_URL = "https://qrsgyerhotxwhldmtqec.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2d5ZXJob3R4d2hsZG10cWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Nzc5NzIsImV4cCI6MjA4OTE1Mzk3Mn0.Bw-zuZr4lJ4RaAMyNVbfixZoWpOR5kR4V2LY-zERvfo
";

        let supabaseClient = null;
        let myChannel = null;
        let typingTimer = null;
        let lastTypingSent = 0;

        let chatData = [];
        let activeMsgId = null;
        let currentUser = '';
        let partnerUser = '';
        let isChatOpen = false;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error(e);
        }

        function escapeHtml(str) {
            return String(str || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function formatRelativeTime(dateString) {
            if (!dateString) return '';
            const d = new Date(dateString);
            const now = new Date();
            const diffMs = now - d;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHr = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHr / 24);

            if (diffSec < 10) return 'just now';
            if (diffSec < 60) return `${diffSec}s ago`;
            if (diffMin < 60) return `${diffMin}m ago`;
            if (diffHr < 24) return `${diffHr}h ago`;
            if (diffDay < 7) return `${diffDay}d ago`;

            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function checkLogin() {
            if (!supabaseClient) {
                alert("Backend load nahi hua.");
                return;
            }

            let email = document.getElementById('user-email').value.trim().toLowerCase();
            let pass = document.getElementById('user-pass').value;
            let btn = document.getElementById('login-btn');

            if (!email || !pass) {
                alert("Please enter Email and Password");
                return;
            }

            btn.innerText = "Checking...";

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) {
                alert("Login failed");
                btn.innerText = "Enter";
                return;
            }

            if (email === "houston@boobie.com") {
                currentUser = 'ahrnavsharma';
                partnerUser = 'lovleenx';
            } else if (email === "pcw69@boobie.com") {
                currentUser = 'lovleenx';
                partnerUser = 'ahrnavsharma';
            } else {
                currentUser = email.split('@')[0];
                partnerUser = 'partner';
            }

            document.getElementById('my-username-display').innerText = currentUser;
            document.getElementById('partner-username-display').innerText = partnerUser;
            document.getElementById('chat-partner-name').innerText = partnerUser;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dm-list-ui').style.display = 'flex';

            loadSettings();
            await fetchMessages();
            setupRealtime();

            btn.innerText = "Enter";
        }

        async function fetchMessages() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (!error && data) {
                chatData = data;
                renderMessages(document.getElementById('dm-search').value || '');
            }
        }

        function setupRealtime() {
            if (myChannel) {
                supabaseClient.removeChannel(myChannel);
            }

            myChannel = supabaseClient.channel('global-chat');

            myChannel
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'messages'
                }, async (payload) => {
                    await fetchMessages();

                    if (!isChatOpen && payload.eventType === 'INSERT' && payload.new.sender !== currentUser) {
                        document.getElementById('unread-dot').style.display = 'block';
                    }

                    if (isChatOpen) {
                        markMessagesAsSeen();
                    }
                })
                .on('broadcast', { event: 'typing' }, (payload) => {
                    if (payload.payload.user !== currentUser) {
                        let ind = document.getElementById('typing-ind');
                        ind.style.display = 'block';
                        ind.innerText = `${partnerUser} is typing...`;

                        clearTimeout(typingTimer);
                        typingTimer = setTimeout(() => {
                            ind.style.display = 'none';
                        }, 1500);
                    }
                })
                .subscribe((status) => {
                    console.log('Realtime:', status);
                });
        }

        function handleTyping() {
            const now = Date.now();
            if (!myChannel) return;
            if (now - lastTypingSent < 700) return;

            lastTypingSent = now;
            myChannel.send({
                type: 'broadcast',
                event: 'typing',
                payload: { user: currentUser }
            });
        }

        async function sendMsg() {
            let i = document.getElementById('msg-in');
            let text = i.value.trim();
            if (!text) return;

            i.value = '';

            const { error } = await supabaseClient.from('messages').insert([{
                text: text,
                sender: current
