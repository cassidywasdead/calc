<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scientific Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px); }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: #fff; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- WORKING CALCULATOR UI --- */
        #calc-container { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; height: 100%; }
        #display { flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; font-size: 60px; padding: 20px; overflow: hidden; word-break: break-all; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { height: 75px; border-radius: 50%; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .btn:active { opacity: 0.7; transform: scale(0.95); }
        .num { background: #333; color: white; }
        .op { background: #f1a33c; color: white; }
        .top { background: #a5a5a5; color: black; }
        .zero { grid-column: span 2; border-radius: 40px; }

        /* --- HIDDEN LOGIN & CHAT --- */
        #secret-app { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .login-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .input { width: 85%; padding: 16px; margin-bottom: 12px; background: #1c1c1e; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; }
        .login-btn { width: 85%; padding: 16px; background: #007aff; border: none; border-radius: 12px; color: #fff; font-weight: bold; }

        /* Chat Styles */
        #chat-ui { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; background: #000; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; }
        .me { align-self: flex-end; background: #007aff; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #262626; border-bottom-left-radius: 4px; }
        #input-area { padding: 10px; display: flex; gap: 10px; border-top: 1px solid #262626; padding-bottom: calc(var(--safe-bottom) + 10px); }
        #msg-in { flex: 1; padding: 12px; background: #1c1c1e; border: none; border-radius: 20px; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="calc-container">
        <div id="display">0</div>
        <div class="grid">
            <button class="btn top" onclick="handleAC()" id="ac-btn">AC</button>
            <button class="btn top">+/-</button>
            <button class="btn top">%</button>
            <button class="btn op" onclick="pressOp('/')">÷</button>
            <button class="btn num" onclick="pressNum('7')">7</button>
            <button class="btn num" onclick="pressNum('8')">8</button>
            <button class="btn num" onclick="pressNum('9')">9</button>
            <button class="btn op" onclick="pressOp('*')">×</button>
            <button class="btn num" onclick="pressNum('4')">4</button>
            <button class="btn num" onclick="pressNum('5')">5</button>
            <button class="btn num" onclick="pressNum('6')">6</button>
            <button class="btn op" onclick="pressOp('-')">-</button>
            <button class="btn num" onclick="pressNum('1')">1</button>
            <button class="btn num" onclick="pressNum('2')">2</button>
            <button class="btn num" onclick="pressNum('3')">3</button>
            <button class="btn op" onclick="pressOp('+')">+</button>
            <button class="btn num zero" onclick="pressNum('0')">0</button>
            <button class="btn num" onclick="pressNum('.')">.</button>
            <button class="btn op" onclick="calculate()">=</button>
        </div>
    </div>

    <div id="secret-app">
        <div id="login-screen" class="login-box">
            <h2 style="font-weight: 300; margin-bottom: 20px;">Premium Membership</h2>
            <input type="text" id="user" class="input" placeholder="Membership ID">
            <input type="password" id="pass" class="input" placeholder="Access PIN">
            <button class="login-btn" onclick="tryLogin()">Unlock</button>
            <p style="margin-top: 20px; color: #555; font-size: 12px;" onclick="location.reload()">Back to Calculator</p>
        </div>

        <div id="chat-ui">
            <div style="padding: 15px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between;">
                <b>lovleenx</b>
                <span onclick="location.reload()" style="color: #ff3b30; font-size: 12px;">CLOSE</span>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="color: #007aff; background: none; border: none; font-weight: bold;">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // --- CALCULATOR LOGIC ---
        let current = '0';
        function updateDisp() { document.getElementById('display').innerText = current; }
        function pressNum(n) { if(current === '0') current = n; else current += n; updateDisp(); }
        function pressOp(o) { current += o; updateDisp(); }
        function calculate() { try { current = eval(current).toString(); updateDisp(); } catch { current = 'Error'; updateDisp(); } }
        
        // --- SECRET TRIGGER (Double Tap AC) ---
        let lastClick = 0;
        function handleAC() {
            let now = Date.now();
            if (now - lastClick < 500) { // Double tap detect
                document.getElementById('secret-app').style.display = 'flex';
            }
            current = '0';
            updateDisp();
            lastClick = now;
        }

        // --- LOGIN & CHAT ---
        function tryLogin() {
            let u = document.getElementById('user').value;
            let p = document.getElementById('pass').value;
            // Yahan wahi admin / 1234 use karlo trial ke liye
            if(u === 'admin' && p === '1234') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                document.getElementById('messages').innerHTML = '<div class="msg them">Premium Membership Active! Type anything...</div>';
            } else { alert("No active subscription found."); }
        }

        function send() {
            let i = document.getElementById('msg-in');
            if(!i.value) return;
            document.getElementById('messages').innerHTML += `<div class="msg me">${i.value}</div>`;
            i.value = '';
            let m = document.getElementById('messages'); m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
