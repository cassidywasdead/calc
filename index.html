<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Scientific Calculator</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px); --theme-bg: #000; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: fixed; width: 100%; }

        /* --- 1. CALCULATOR (THE MASK) --- */
        #calc-ui { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; height: 100%; background: #000; }
        #display { flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; font-size: 65px; padding: 20px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { height: 75px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .num { background: #333; color: white; } .op { background: #f1a33c; color: white; } .top { background: #a5a5a5; color: black; } .zero { grid-column: span 2; border-radius: 40px; }

        /* --- 2. SECRET APP (HIDDEN) --- */
        #secret-app { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        
        /* New global-fixed SOS in headers context */
        .sos-btn { width: 45px; height: 45px; background: rgba(255, 59, 48, 0.9); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* --- A. LOGIN SCREEN --- */
        #login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-box { width: 85%; padding: 16px; margin-bottom: 12px; background: #1c1c1e; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; outline: none; }
        .login-btn { width: 85%; padding: 16px; background: #007aff; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        /* --- B. DM LIST (INSTA DM STYLE) --- */
        #dm-list-ui { display: none; flex-direction: column; height: 100%; width: 100%; padding-top: var(--safe-top); }
        
        /* FIXED: Proper non-overlap header */
        .dm-header { padding: 15px 20px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .header-info-group { flex: 1; }
        .header-name { font-weight: 700; font-size: 20px; margin-bottom: 5px; }
        .header-btns-group { display: flex; gap: 10px; align-items: center; }

        .settings-btn { background: #1c1c1e; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 15px; font-size: 14px; cursor: pointer; }

        /* Search Bar (Both Pages) */
        .search-container { padding: 10px 15px; border-bottom: 1px solid #111; z-index: 9; background: rgba(0,0,0,0.9); }
        .search-bar { width: 100%; padding: 10px 15px; background: #1c1c1e; border-radius: 15px; border: 1px solid #333; color: white; font-size: 14px; outline: none; }

        .dm-item { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; }
        .dm-pfp { width: 55px; height: 55px; border-radius: 50%; background: #333; margin-right: 15px; object-fit: cover; }
        .dm-preview { font-size: 14px; color: #8e8e93; margin-top: 4px; }

        /* --- C. CHAT UI --- */
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--theme-bg); background-size: cover; background-position: center; }
        #chat-header { padding: calc(var(--safe-top) + 10px) 15px 12px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10; justify-content: flex-start; }
        .chat-pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 18px; }
        .msg-wrap { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .me { align-self: flex-end; align-items: flex-end; }
        .them { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; cursor: pointer; }
        .bubble-me { background: #3797f0; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; border-bottom-left-radius: 4px; }
        
        .chat-img { max-width: 100%; border-radius: 12px; margin-bottom: 5px; }
        
        .msg-footer { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; margin-top: 4px; }
        .react-badge { background: #1c1c1e; border: 1px solid #333; padding: 2px 6px; border-radius: 12px; font-size: 13px; display: none; }
        .seen-text { color: #3797f0; display: none; }

        /* Typing & Input */
        #typing-ind { padding: 5px 15px; font-size: 12px; color: #888; display: none; }
        #input-bar { padding: 10px 15px calc(var(--safe-bottom) + 10px); display: flex; gap: 10px; border-top: 1px solid #262626; background: rgba(0,0,0,0.9); z-index: 10; align-items: center; }
        #msg-in { flex: 1; padding: 12px 18px; background: #1c1c1e; border: none; border-radius: 25px; color: #fff; font-size: 16px; outline: none; }

        /* --- REACTION TRAY --- */
        #react-tray { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #262626; padding: 10px 15px; border-radius: 30px; gap: 12px; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .react-emoji { font-size: 24px; cursor: pointer; transition: 0.2s; } .react-emoji:active { transform: scale(1.3); }

        /* --- D. SETTINGS MODAL --- */
        #settings-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .set-box { width: 90%; background: #1c1c1e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: left; }
        .file-label { color:#aaa; font-size:14px; display:block; margin-bottom:5px; margin-top: 15px;}
    </style>
</head>
<body>

    <div id="calc-ui">
        <div id="display">0</div>
        <div class="grid">
            <button class="btn top" onclick="handleAC()">AC</button><button class="btn top">+/-</button><button class="btn top">%</button><button class="btn op" onclick="press('/')">÷</button>
            <button class="btn num" onclick="press('7')">7</button><button class="btn num" onclick="press('8')">8</button><button class="btn num" onclick="press('9')">9</button><button class="btn op" onclick="press('*')">×</button>
            <button class="btn num" onclick="press('4')">4</button><button class="btn num" onclick="press('5')">5</button><button class="btn num" onclick="press('6')">6</button><button class="btn op" onclick="press('-')">-</button>
            <button class="btn num" onclick="press('1')">1</button><button class="btn num" onclick="press('2')">2</button><button class="btn num" onclick="press('3')">3</button><button class="btn op" onclick="press('+')">+</button>
            <button class="btn num zero" onclick="press('0')">0</button><button class="btn num">.</button><button class="btn op" onclick="equal()">=</button>
        </div>
    </div>

    <div id="secret-app">
        
        <div id="login-screen">
            <h2 style="font-weight: 200; margin-bottom: 20px;">Premium Access</h2>
            <input type="text" id="user" class="input-box" placeholder="Membership ID (123)" inputmode="numeric">
            <input type="password" id="pass" class="input-box" placeholder="Access PIN (123)" inputmode="numeric">
            <button class="login-btn" onclick="checkLogin()">Enter</button>
        </div>

        <div id="dm-list-ui">
            <div class="dm-header">
                <div class="header-info-group">
                    <div class="header-name">ahrnavsharma</div>
                </div>
                <div class="header-btns-group">
                    <button class="settings-btn" onclick="openSettings()">⚙️ Settings</button>
                    <div class="sos-btn" onclick="forceLogout()">SOS</div>
                </div>
            </div>
            
            <div class="search-container">
                <input type="text" id="dm-search" class="search-bar" placeholder="🔍 Search in ahrnavsharma..." oninput="searchMessages()">
            </div>

            <div class="dm-item" onclick="openChat()">
                <img id="list-pfp" src="https://ui-avatars.com/api/?name=L&background=random" class="dm-pfp">
                <div style="flex:1;">
                    <div class="dm-name">lovleenx</div>
                    <div class="dm-preview" id="last-msg-preview">Tap to view chat...</div>
                </div>
            </div>
        </div>

        <div id="chat-ui">
            <div id="chat-header">
                <button onclick="backToList()" style="background:none; border:none; color:#fff; font-size:26px; padding-right:10px; cursor:pointer;">‹</button>
                <img id="chat-pfp" src="https://ui-avatars.com/api/?name=L&background=random" class="chat-pfp">
                <div style="font-weight:700; font-size:16px; margin-left:10px; flex:1;">lovleenx</div>
                <div class="sos-btn" onclick="forceLogout()">SOS</div>
            </div>
            
            <div class="search-container">
                <input type="text" id="chat-search" class="search-bar" placeholder="🔍 Search messages in chat..." oninput="searchMessages()">
            </div>
            
            <div id="messages"></div>
            <div id="typing-ind">lovleenx is typing...</div>

            <div id="input-bar">
                <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="sendPhoto(event)">
                <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:24px; cursor:pointer;">📷</button>
                <input type="text" id="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:none; border:none; color:#3797f0; font-weight:bold; font-size:16px; padding-left:5px; cursor:pointer;">Send</button>
            </div>

            <div id="react-tray">
                <span class="react-emoji" onclick="setReact('🥰')">🥰</span>
                <span class="react-emoji" onclick="setReact('😘')">😘</span>
                <span class="react-emoji" onclick="setReact('🫠')">🫠</span>
                <span class="react-emoji" onclick="setReact('🥺')">🥺</span>
                <span class="react-emoji" onclick="setReact('😂')">😂</span>
                <span class="react-emoji" onclick="setReact('😡')">😡</span>
            </div>
        </div>

        <div id="settings-ui">
            <div class="set-box">
                <h3 style="margin-bottom:25px; text-align:center;">App Settings</h3>
                
                <label class="file-label">Partner DP (Lovleen's) • Gallery:</label>
                <input type="file" id="set-pfp-file" class="input-box" accept="image/*">
                
                <label class="file-label">Your DP (Ahrnav's) • Gallery:</label>
                <input type="file" id="set-mypfp-file" class="input-box" accept="image/*">
                
                <label class="file-label">Chat Theme Background • Gallery:</label>
                <input type="file" id="set-bg-file" class="input-box" accept="image/*">
                
                <button class="login-btn" onclick="saveSettings()" style="margin-top:25px;">Save Gallery Pictures</button>
                <p style="margin-top: 25px; color: #ff3b30; font-size: 14px; cursor:pointer; text-align:center;" onclick="closeSettings()">Cancel</p>
            </div>
        </div>

    </div>

    <script>
        // MOCK DATA
        let chatData = [
            { id: 1, text: "Hii baby! Search kar le purani chats.", sender: "them", time: "11:00 PM", react: "", type: "text", seen: true },
            { id: 2, text: "Wait, main check kar raha hoon.", sender: "me", time: "11:02 PM", react: "", type: "text", seen: true }
        ];
        let activeMsgId = null;

        // --- 1. CALCULATOR (Triple Tap) ---
        let exp = '0'; let taps = 0; let lastTap = 0;
        function update() { document.getElementById('display').innerText = exp; }
        function press(v) { if(exp === '0') exp = v; else exp += v; update(); }
        function equal() { try { exp = eval(exp).toString(); update(); } catch { exp = 'Error'; update(); } }
        
        function handleAC() {
            let now = Date.now();
            if (now - lastTap < 600) taps++; else taps = 1;
            lastTap = now;
            if (taps === 3) { 
                document.getElementById('secret-app').style.display = 'flex'; 
                document.getElementById('calc-ui').style.display = 'none'; 
                taps = 0; 
            }
            exp = '0'; update();
        }

        // --- 2. LOGIN & NAVIGATION ---
        function checkLogin() {
            if(document.getElementById('user').value === '123' && document.getElementById('pass').value === '123') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dm-list-ui').style.display = 'flex';
                loadSettings(); renderMessages();
            } else alert("Invalid Code");
        }
        function openChat() { document.getElementById('dm-list-ui').style.display='none'; document.getElementById('chat-ui').style.display='flex'; scrollToBottom(); }
        function backToList() { document.getElementById('chat-ui').style.display='none'; document.getElementById('dm-list-ui').style.display='flex'; }
        
        function forceLogout() {
            document.getElementById('user').value = ''; document.getElementById('pass').value = '';
            document.getElementById('secret-app').style.display = 'none';
            document.getElementById('calc-ui').style.display = 'flex';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dm-list-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'none';
        }

        // --- 3. SETTINGS LOGIC (With Base64 Gallery Fix) ---
        function openSettings() { document.getElementById('settings-ui').style.display='flex'; }
        function closeSettings() { document.getElementById('settings-ui').style.display='none'; }
        
        function saveSettings() {
            const pfpFile = document.getElementById('set-pfp-file').files[0];
            const mypfpFile = document.getElementById('set-mypfp-file').files[0];
            const bgFile = document.getElementById('set-bg-file').files[0];

            // Helper function to convert file to Base64 and save to localStorage
            const readAndSave = (file, storageKey) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    localStorage.setItem(storageKey, reader.result);
                    if (storageKey === 'partnerPfp' || storageKey === 'myPfp' || storageKey === 'chatBg') {
                        loadSettings(); // Auto refresh after each read completes
                    }
                };
                reader.readAsDataURL(file);
            };

            if(pfpFile) readAndSave(pfpFile, 'partnerPfp');
            if(mypfpFile) readAndSave(mypfpFile, 'myPfp');
            if(bgFile) readAndSave(bgFile, 'chatBg');

            closeSettings();
            // Clear file inputs
            document.getElementById('set-pfp-file').value = '';
            document.getElementById('set-mypfp-file').value = '';
            document.getElementById('set-bg-file').value = '';
        }
        
        function loadSettings() {
            const pfpBase64 = localStorage.getItem('partnerPfp');
            const mypfpBase64 = localStorage.getItem('myPfp');
            const bgBase64 = localStorage.getItem('chatBg');

            if(pfpBase64) { 
                document.getElementById('list-pfp').src = pfpBase64; 
                document.getElementById('chat-pfp').src = pfpBase64; 
            }
            if(bgBase64) { 
                document.documentElement.style.setProperty('--theme-bg', `url('${bgBase64}')`); 
            }
            // Ahrnav's PFP is loaded in chat bubble render itself
        }

        // --- 4. CHAT RENDERING & SEARCH (Crash Bug Fixed) ---
        function renderMessages(query = '') {
            let container = document.getElementById('messages');
            container.innerHTML = '';
            
            // Bug Fix: Clean search filter logic - now m is properly defined inside the loop
            let filtered = chatData.filter(m => m.type === 'text' ? m.text.toLowerCase().includes(query.toLowerCase()) : true);
            
            filtered.forEach((m, index) => {
                let isMe = m.sender === 'me';
                let content = m.type === 'img' ? `<img src="${m.text}" class="chat-img">` : m.text;
                let reactHTML = m.react ? `<span class="react-badge" style="display:inline-block;">${m.react}</span>` : '';
                
                // PFP logic for each bubble
                let pfpBase64 = isMe ? localStorage.getItem('myPfp') : localStorage.getItem('partnerPfp');
                let defaultAvatar = isMe ? 'A' : 'L';
                let pfpSrc = pfpBase64 ? pfpBase64 : `https://ui-avatars.com/api/?name=${defaultAvatar}&background=random`;

                // Seen Fix: Supabase tak seen FALSE rakha hai. No auto-seen.
                let isLastMe = (isMe && index === filtered.length - 1 && !query && m.seen);
                let seenHTML = isLastMe ? `<span class="seen-text" style="display:inline;">• Seen</span>` : '';

                container.innerHTML += `
                    <div class="msg-wrap ${isMe ? 'me' : 'them'}">
                        <div style="display:flex; align-items:flex-end; gap:8px;">
                            ${!isMe ? `<img src="${pfpSrc}" class="chat-pfp">` : ''}
                            <div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}" onclick="openReact(${m.id})">
                                ${content}
                            </div>
                        </div>
                        <div class="msg-footer">
                            ${isMe ? reactHTML : ''}
                            <span>${m.time}</span>
                            ${seenHTML}
                            ${!isMe ? reactHTML : ''}
                        </div>
                    </div>`;
            });
            
            // Last message preview update (Fixed)
            if(chatData.length > 0) {
                let lastMsg = chatData[chatData.length - 1];
                let previewText = lastMsg.type === 'img' ? "📷 Photo" : lastMsg.text;
                if(previewText.length > 20) previewText = previewText.substring(0, 20) + "...";
                document.getElementById('last-msg-preview').innerText = previewText;
            }
        }

        function searchMessages() {
            let dmQ = document.getElementById('dm-search').value;
            let chatQ = document.getElementById('chat-search').value;
            let q = dmQ || chatQ;
            renderMessages(q);
        }

        // --- 5. SENDING LOGIC (With time stamps and false seen) ---
        function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        function sendMsg() {
            let i = document.getElementById('msg-in'); if(!i.value.trim()) return;
            // Naya message, seen FALSE hamesha (Jab tak Supabase na aaye)
            chatData.push({ id: Date.now(), text: i.value, sender: "me", time: getTime(), react: "", type: "text", seen: false });
            i.value = ''; 
            document.getElementById('chat-search').value = ''; // Clear search when sending
            renderMessages(); scrollToBottom();
        }

        function sendPhoto(event) {
            const file = event.target.files[0]; if(!file) return;
            // Temporary URL for local mock test
            const imgUrl = URL.createObjectURL(file);
            chatData.push({ id: Date.now(), text: imgUrl, sender: "me", time: getTime(), react: "", type: "img", seen: false });
            renderMessages(); scrollToBottom();
        }

        // --- 6. REACTIONS ---
        function openReact(id) { activeMsgId = id; document.getElementById('react-tray').style.display = 'flex'; }
        function setReact(emoji) {
            let m = chatData.find(x => x.id === activeMsgId);
            if(m) m.react = emoji;
            document.getElementById('react-tray').style.display = 'none';
            renderMessages();
        }

        window.onclick = (e) => { 
            if(!e.target.closest('.bubble') && !e.target.closest('#react-tray')) 
                document.getElementById('react-tray').style.display='none'; 
        }

        function scrollToBottom() { let m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
    </script>
</body>
</html>
