<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scientific Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100dvh; background: #000; color: #fff; }
        
        /* THE SOS - FIXED TO VIEWPORT */
        #sos-btn {
            position: fixed; top: calc(var(--safe-top) + 15px); right: 15px; width: 48px; height: 48px;
            background: rgba(255, 59, 48, 0.9); color: white; border-radius: 50%; display: none; 
            justify-content: center; align-items: center; font-size: 11px; font-weight: 800; 
            z-index: 99999; box-shadow: 0 0 15px rgba(255,0,0,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .container { max-width: 500px; margin: auto; height: 100%; display: flex; flex-direction: column; position: relative; background: #000; }
        #login-screen, #inbox-screen, #chat-screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; }
        
        /* Login */
        #login-screen { display: flex; align-items: center; justify-content: center; z-index: 1000; background: #000; }
        .login-input { width: 80%; padding: 15px; background: #121212; border: 1px solid #262626; border-radius: 10px; color: #fff; margin-bottom: 12px; outline: none; }
        .login-btn { width: 80%; padding: 15px; background: #c13584; color: #fff; border: none; border-radius: 10px; font-weight: 700; }

        /* Inbox */
        #inbox-screen { padding-top: var(--safe-top); z-index: 100; background: #000; }
        .inbox-header { padding: 20px; font-size: 22px; font-weight: 800; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; }
        .chat-row { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; }
        .pfp-main { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 2px solid #c13584; object-fit: cover; }
        .theme-btn { font-size: 11px; background: #262626; padding: 5px 12px; border-radius: 20px; cursor: pointer; }

        /* Chat Room */
        #header { padding: calc(var(--safe-top) + 10px) 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; background: #000; }
        .profile-area { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; border: 1.5px solid #fff; margin-right: 12px; }
        .search-icon { font-size: 20px; margin-left: auto; cursor: pointer; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; background-size: cover; background-position: center; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 12px; }
        .my-wrapper { align-self: flex-end; align-items: flex-end; }
        .their-wrapper { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 16px; border-radius: 22px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.has-reaction { margin-bottom: 18px; }
        .my-msg { background-color: #e895b6; color: #000; border-bottom-right-radius: 4px; }
        .their-msg { background-color: #521c31; border-bottom-left-radius: 4px; color: #fff; }
        .msg img { max-width: 100%; border-radius: 12px; display: block; }

        .reaction-tag { position: absolute; bottom: -14px; font-size: 13px; background: rgba(0,0,0,0.8); border-radius: 12px; padding: 2px 6px; }
        .time { font-size: 10px; color: rgba(255,255,255,0.5); margin: 4px 5px 0; }
        .seen-status { font-size: 11px; color: #e895b6; font-weight: 500; align-self: flex-end; margin-top: -8px; margin-bottom: 8px; }
        .typing-indicator { font-size: 12px; color: #aaa; padding: 5px 20px; display: none; font-style: italic; }

        #input-area { padding: 10px 15px calc(var(--safe-bottom) + 15px); background: #000; display: flex; gap: 10px; align-items: center; border-top: 1px solid #262626; }
        #msg-input { flex: 1; padding: 12px 18px; background: #121212; border: 1px solid #333; border-radius: 25px; color: #fff; outline: none; }
        
        #search-bar { padding: 10px 15px; background: #111; display: none; gap: 10px; border-bottom: 1px solid #262626; }
        #search-input { flex: 1; padding: 8px 15px; border-radius: 20px; background: #222; border: none; color: #fff; }
    </style>
</head>
<body>
    <div id="sos-btn" onclick="triggerSOS()">SOS</div>
    
    <div class="container">
        <div id="login-screen">
            <div style="text-align:center; width:100%;">
                <h1 style="font-weight:200;">Scientific Calculator</h1>
                <input type="email" id="email" class="login-input" placeholder="User ID">
                <input type="password" id="password" class="login-input" placeholder="Access Code">
                <button class="login-btn" onclick="login()">Sync Database</button>
            </div>
        </div>

        <div id="inbox-screen">
            <div class="inbox-header">
                <span id="my-name-display">ahrnavsharma</span>
                <span class="theme-btn" onclick="setChatBG()">Theme 🎨</span>
            </div>
            <div class="chat-row" onclick="openChat()">
                <img id="inbox-partner-pfp" class="pfp-main" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <div class="inbox-details">
                    <div class="inbox-name" id="inbox-partner-name">lovleenx</div>
                    <div id="last-msg-preview" style="font-size:13px; color:#666;">Tap to chat</div>
                </div>
            </div>
        </div>

        <div id="chat-screen">
            <div id="header">
                <div class="back-btn" onclick="closeChat()">‹</div>
                <div class="profile-area" onclick="setPartnerPFP()"><img id="chat-partner-pfp" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="user-name" id="chat-partner-name">lovleenx</div>
                <div class="search-icon" onclick="toggleSearch()">🔍</div>
            </div>
            <div id="search-bar">
                <input type="text" id="search-input" placeholder="Search..." oninput="doSearch()">
            </div>
            <div id="messages"></div>
            <div id="typing-bubble" class="typing-indicator">typing...</div>
            <div id="input-area">
                <label style="font-size:30px; color:#e895b6; cursor:pointer;" for="file-input">+</label>
                <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(this)">
                <input type="text" id="msg-input" placeholder="Message..." onfocus="markAsRead()">
                <button onclick="sendMessage()" style="background:none; border:none; color:#fff; font-weight:700;">Send</button>
            </div>
        </div>
    </div>

    <div id="reaction-picker" style="display:none; position:fixed; background:#1a1a1a; border:1px solid #333; border-radius:30px; padding:10px; z-index:100000; gap:15px;">
        <span onclick="addReaction('❤️')" style="font-size:25px; cursor:pointer;">❤️</span>
        <span onclick="addReaction('😂')" style="font-size:25px; cursor:pointer;">😂</span>
        <span onclick="addReaction('🔥')" style="font-size:25px; cursor:pointer;">🔥</span>
        <span onclick="addReaction('😢')" style="font-size:25px; cursor:pointer;">😢</span>
    </div>

    <script>
    const firebaseConfig = {
    apiKey: "AIzaSyBCrx5hqoBFAR9VDNJ4opUBp3hTuL3bGJ4",
    authDomain: "secretspace-ca604.firebaseapp.com",
    projectId: "secretspace-ca604",
    storageBucket: "secretspace-ca604.firebasestorage.app",
    messagingSenderId: "440793813496",
    appId: "1:440793813496:web:405615f2dc570b296b460d",
    measurementId: "G-2N4RWH4VK0"
  };    
        const ARNAV_EMAIL = "ak5940962@gmail.com"; const LOVLEEN_EMAIL = "pcw69@secret.com";
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
        
        let activeMsgId = null; let isChatOpen = false; let globalMsgs = []; 
        let partnerReadTime = null; let searchQuery = "";

        // LOGIN WITH HACKER MSG
        function login() { 
            auth.signInWithEmailAndPassword(document.getElementById('email').value.trim().toLowerCase(), document.getElementById('password').value)
            .catch(() => alert("是的、你．好，在我的心里永远是最美滴HACKED\n你，好想，iPhone\n是．你．我\nCLOSE APP RIGHT NOW ELSE HACKED\n一起期待新，我在")); 
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('inbox-screen').style.display = 'flex';
                document.getElementById('sos-btn').style.display = 'flex';
                const amIArnav = user.email === ARNAV_EMAIL;
                document.getElementById('my-name-display').innerText = amIArnav ? "ahrnavsharma" : "lovleenx";
                const pName = amIArnav ? "lovleenx" : "ahrnavsharma";
                document.getElementById('inbox-partner-name').innerText = pName;
                document.getElementById('chat-partner-name').innerText = pName;
                loadTheme(); loadProfiles(); listenToReadReceipts(); listenToTyping(); loadMessages();
            }
        });

        function triggerSOS() { auth.signOut().then(() => window.location.replace("https://www.google.com/search?q=calculator")); }
        function openChat() { isChatOpen = true; document.getElementById('inbox-screen').style.display='none'; document.getElementById('chat-screen').style.display='flex'; markAsRead(); renderMessages(); }
        function closeChat() { isChatOpen = false; document.getElementById('chat-screen').style.display='none'; document.getElementById('inbox-screen').style.display='flex'; }

        // TIME AGO HELPER
        function timeAgo(date) {
            if(!date) return "";
            const sec = Math.floor((new Date() - date) / 1000);
            if (sec < 60) return "just now";
            return Math.floor(sec / 60) + "m ago";
        }

        // PRESENCE & TYPING
        function markAsRead() { if(isChatOpen) { const k = auth.currentUser.email === ARNAV_EMAIL ? 'arnavRead' : 'lovleenRead'; db.collection('settings').doc('receipts').set({ [k]: firebase.firestore.FieldValue.serverTimestamp() }, {merge: true}); } }
        function listenToReadReceipts() { db.collection('settings').doc('receipts').onSnapshot(doc => { if(doc.exists) { partnerReadTime = doc.data()[auth.currentUser.email === ARNAV_EMAIL ? 'lovleenRead' : 'arnavRead']?.toDate(); if(isChatOpen) renderMessages(); } }); }
        function setTyping(s) { const k = auth.currentUser.email === ARNAV_EMAIL ? 'arnavTyping' : 'lovleenTyping'; db.collection('settings').doc('typing').set({ [k]: s }, {merge: true}); }
        document.getElementById('msg-input').addEventListener('input', () => { setTyping(true); clearTimeout(window.tT); window.tT = setTimeout(()=>setTyping(false), 2000); });
        function listenToTyping() { const o = auth.currentUser.email === ARNAV_EMAIL ? 'lovleenTyping' : 'arnavTyping'; db.collection('settings').doc('typing').onSnapshot(doc => { document.getElementById('typing-bubble').style.display = (doc.exists && doc.data()[o]) ? 'block' : 'none'; }); }

        // THEME & PFP
        function setChatBG() { const url = prompt("Paste Background Image URL:"); if(url) db.collection('settings').doc('theme').set({ bg: url.trim() }, {merge: true}); }
        function loadTheme() { db.collection('settings').doc('theme').onSnapshot(doc => { if(doc.exists) document.getElementById('messages').style.backgroundImage = `url('${doc.data().bg}')`; }); }
        function setPartnerPFP() { const url = prompt("Partner DP URL:"); if(url) db.collection('settings').doc('profiles').set({ [auth.currentUser.email === ARNAV_EMAIL ? 'lovleenPfp' : 'arnavPfp']: url.trim() }, {merge: true}); }
        function setMyPFP() { const url = prompt("Your DP URL:"); if(url) db.collection('settings').doc('profiles').set({ [auth.currentUser.email === ARNAV_EMAIL ? 'arnavPfp' : 'lovleenPfp']: url.trim() }, {merge: true}); }
        function loadProfiles() { db.collection('settings').doc('profiles').onSnapshot(doc => { if(doc.exists) { const p = auth.currentUser.email === ARNAV_EMAIL ? doc.data().lovleenPfp : doc.data().arnavPfp; const final = p || "https://cdn-icons-png.flaticon.com/512/149/149071.png"; document.getElementById('inbox-partner-pfp').src = final; document.getElementById('chat-partner-pfp').src = final; } }); }

        // MESSAGES
        function loadMessages() { db.collection('chats').orderBy('timestamp').onSnapshot(snap => { globalMsgs = []; snap.forEach(doc => globalMsgs.push({id: doc.id, ...doc.data()})); if(isChatOpen) renderMessages(); }); }
        function sendMessage() { const t = document.getElementById('msg-input').value.trim(); if(!t) return; db.collection('chats').add({ text: t, type: "msg", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); document.getElementById('msg-input').value = ""; markAsRead(); }
        function handleImage(i) { const f = i.files[0]; if(!f) return; const r = new FileReader(); r.onload = (e) => db.collection('chats').add({ text: e.target.result, type: "img", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); r.readAsDataURL(f); }

        function renderMessages() {
            const div = document.getElementById('messages'); div.innerHTML = '';
            const msgs = globalMsgs.filter(m => searchQuery==="" || (m.type==='msg' && m.text.toLowerCase().includes(searchQuery)));
            msgs.forEach((m, i) => {
                const isMe = m.sender === auth.currentUser.email;
                const w = document.createElement('div'); w.className = 'msg-wrapper ' + (isMe ? 'my-wrapper' : 'their-wrapper');
                const b = document.createElement('div'); b.className = 'msg ' + (isMe ? 'my-msg' : 'their-msg');
                if(m.type==='img') b.innerHTML=`<img src="${m.text}">`; else b.innerText=m.text;
                if(m.reaction){ b.classList.add('has-reaction'); b.innerHTML += `<span class="reaction-tag">${m.reaction}</span>`; }
                b.onclick=(e)=>{ e.stopPropagation(); activeMsgId=m.id; const p=document.getElementById('reaction-picker'); p.style.display='flex'; p.style.top=(e.clientY-60)+'px'; p.style.left=(e.clientX-50)+'px'; };
                const t = document.createElement('div'); t.className='time'; t.innerText=m.timestamp ? m.timestamp.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : "";
                w.appendChild(b); w.appendChild(t); div.appendChild(w);
                if(isMe && i === msgs.length-1 && partnerReadTime && m.timestamp && partnerReadTime >= m.timestamp.toDate()) {
                    const s = document.createElement('div'); s.className = 'seen-status'; 
                    s.innerText = "Seen " + timeAgo(partnerReadTime); div.appendChild(s);
                }
            });
            div.scrollTop = div.scrollHeight;
        }

        function toggleSearch() { const s = document.getElementById('search-bar'); s.style.display = s.style.display==='flex'?'none':'flex'; if(s.style.display==='none'){searchQuery="";renderMessages();} }
        function doSearch() { searchQuery = document.getElementById('search-input').value.toLowerCase(); renderMessages(); }
        function addReaction(e) { if(activeMsgId) db.collection('chats').doc(activeMsgId).update({ reaction: e }); document.getElementById('reaction-picker').style.display='none'; }
        window.onclick = () => document.getElementById('reaction-picker').style.display='none';
    </script>
</body>
</html>
