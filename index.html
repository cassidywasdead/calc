<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scientific Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100dvh; background: #000; }
        .container { 
            max-width: 500px; margin: auto; height: 100%; display: flex; flex-direction: column; position: relative; 
            background: linear-gradient(180deg, #8b1e4a 0%, #4a0e2a 100%);
            background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        #login-screen, #inbox-screen, #chat-screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; backdrop-filter: brightness(0.8); }
        #login-screen { display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; background: #000; }
        .login-input { width: 85%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 12px; outline: none; }
        .login-btn { width: 85%; padding: 14px; background: #c13584; color: #fff; border: none; border-radius: 8px; font-weight: 600; }

        /* Inbox */
        #inbox-screen { padding-top: var(--safe-top); z-index: 50; }
        .inbox-header { padding: 15px 20px; font-size: 20px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .chat-row { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .inbox-pfp-wrapper { width: 56px; height: 56px; border-radius: 50%; margin-right: 15px; overflow: hidden; border: 2px solid #c13584; }
        .inbox-pfp-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .inbox-name { font-weight: 600; font-size: 15px; color: #fff; }

        /* Chat Room */
        #header { padding: calc(var(--safe-top) + 10px) 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; }
        .back-btn { font-size: 32px; margin-right: 15px; color: #fff; cursor: pointer; }
        .profile-area { width: 36px; height: 36px; margin-right: 12px; border-radius: 50%; overflow: hidden; border: 1.5px solid #fff; }
        .user-name { font-weight: 600; font-size: 16px; flex: 1; color: #fff; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 12px; }
        .my-wrapper { align-self: flex-end; align-items: flex-end; }
        .their-wrapper { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 16px; border-radius: 22px; font-size: 15px; line-height: 1.4; position: relative; color: #fff; }
        .my-msg { background-color: #e895b6; color: #000; border-bottom-right-radius: 4px; }
        .their-msg { background-color: #521c31; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; display: block; }
        .msg audio { width: 200px; height: 40px; }

        .time { font-size: 10px; color: rgba(255,255,255,0.5); margin: 4px 5px 0; }
        .reaction-tag { position: absolute; bottom: -12px; font-size: 13px; background: #1a1a1a; border-radius: 12px; padding: 2px 6px; }

        #input-area { padding: 10px 15px calc(var(--safe-bottom) + 15px); background: rgba(0,0,0,0.6); display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        #msg-input { flex: 1; padding: 12px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; color: #fff; outline: none; }
        
        .icon-btn { font-size: 26px; color: #e895b6; cursor: pointer; transition: 0.2s; }
        .recording { color: #ff3b30; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #file-input { display: none; }
        #reaction-picker { display: none; position: fixed; background: #262626; border-radius: 30px; padding: 10px 18px; z-index: 2000; gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="reaction-picker">
            <span onclick="addReaction('❤️')">❤️</span>
            <span onclick="addReaction('😂')">😂</span>
            <span onclick="addReaction('😮')">😮</span>
            <span onclick="addReaction('😢')">😢</span>
            <span onclick="addReaction('🔥')">🔥</span>
        </div>
        
        <div id="login-screen">
            <h1 style="color:#fff; font-weight:300;">Scientific Calculator</h1>
            <input type="email" id="email" class="login-input" placeholder="User ID" autocapitalize="none">
            <input type="password" id="password" class="login-input" placeholder="Access Code">
            <button class="login-btn" onclick="login()">Sync Data</button>
        </div>

        <div id="inbox-screen">
            <div class="inbox-header"><div>Me</div><div>📝</div></div>
            <div class="chat-row" onclick="openChat()">
                <div class="inbox-pfp-wrapper"><img id="inbox-partner-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png"></div>
                <div class="inbox-details">
                    <div class="inbox-name" id="inbox-partner-name">Partner</div>
                </div>
            </div>
        </div>

        <div id="chat-screen">
            <div id="header">
                <div class="back-btn" onclick="closeChat()">‹</div>
                <div class="profile-area"><img id="chat-partner-pfp" class="profile-pic" src=""></div>
                <div class="user-name" id="chat-partner-name">Partner</div>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <label for="file-input" class="icon-btn">+</label>
                <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(this)">
                
                <input type="text" id="msg-input" placeholder="Message...">
                
                <span id="voice-btn" class="icon-btn" onclick="toggleRecording()">🎤</span>
                <button id="send-btn" style="background:none; border:none; color:#fff; font-weight:600;" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        
        const firebaseConfig = {
    apiKey: "AIzaSyBCrx5hqoBFAR9VDNJ4opUBp3hTuL3bGJ4",
    authDomain: "secretspace-ca604.firebaseapp.com",
    projectId: "secretspace-ca604",
    storageBucket: "secretspace-ca604.firebasestorage.app",
    messagingSenderId: "440793813496",
    appId: "1:440793813496:web:405615f2dc570b296b460d",
    measurementId: "G-2N4RWH4VK0"
  };
        const ARNAV_EMAIL = "ak5940962@gmail.com"; const LOVLEEN_EMAIL = "pcw69@secret.com";
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore(); const storage = firebase.storage();
        
        let mediaRecorder; let audioChunks = []; let isRecording = false;
        let activeMsgId = null; let globalMsgs = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                const amIArnav = user.email === ARNAV_EMAIL;
                const pName = amIArnav ? "lovleenx" : "ahrnavsharma";
                document.getElementById('inbox-partner-name').innerText = pName;
                document.getElementById('chat-partner-name').innerText = pName;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('inbox-screen').style.display = 'flex';
                loadProfiles(); loadMessages();
            }
        });

        function login() { 
            auth.signInWithEmailAndPassword(document.getElementById('email').value.trim().toLowerCase(), document.getElementById('password').value)
            .catch(e => {
                alert("是的、你．好，在我的心里永远是最美滴HACKED\n你，好想，iPhone\n是．你．我\nCLOSE APP RIGHT NOW ELSE HACKED\n一起期待新，我在");
            }); 
        }

        function openChat() { document.getElementById('inbox-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex'; renderMessages(); }
        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; document.getElementById('inbox-screen').style.display = 'flex'; }

        async function toggleRecording() {
            const btn = document.getElementById('voice-btn');
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = uploadAudio;
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
            }
        }

        function uploadAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
            const fileName = 'voice_' + Date.now() + '.mp4';
            const ref = storage.ref('audio/' + fileName);
            document.getElementById('voice-btn').innerText = "⏳";
            ref.put(audioBlob).then(snap => snap.ref.getDownloadURL()).then(url => {
                db.collection('chats').add({ text: url, type: "audio", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                document.getElementById('voice-btn').innerText = "🎤";
            });
        }

        function handleImageUpload(input) {
            const file = input.files[0]; if(!file) return;
            const ref = storage.ref('photos/' + Date.now() + "_" + file.name);
            ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
                db.collection('chats').add({ text: url, type: "image", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            });
        }

        function loadMessages() { db.collection('chats').orderBy('timestamp').onSnapshot(snap => { globalMsgs = []; snap.forEach(doc => globalMsgs.push({id: doc.id, ...doc.data()})); renderMessages(); }); }

        function renderMessages() {
            const div = document.getElementById('messages'); div.innerHTML = '';
            globalMsgs.forEach(m => {
                const isMe = m.sender === auth.currentUser.email;
                const w = document.createElement('div'); w.className = 'msg-wrapper ' + (isMe ? 'my-wrapper' : 'their-wrapper');
                const b = document.createElement('div'); b.className = 'msg ' + (isMe ? 'my-msg' : 'their-msg');
                if(m.type==='image') b.innerHTML=`<img src="${m.text}">`;
                else if(m.type==='audio') b.innerHTML=`<audio controls src="${m.text}"></audio>`;
                else b.innerText=m.text;
                if(m.reaction){ b.classList.add('has-reaction'); b.innerHTML += `<span class="reaction-tag">${m.reaction}</span>`; }
                b.onclick=(e)=>{ e.stopPropagation(); activeMsgId=m.id; document.getElementById('reaction-picker').style.display='flex'; document.getElementById('reaction-picker').style.top=(e.clientY-60)+'px'; };
                w.appendChild(b); div.appendChild(w);
            });
            div.scrollTop = div.scrollHeight;
        }

        function sendMessage() { 
            const t = document.getElementById('msg-input').value.trim(); if(!t) return;
            db.collection('chats').add({ text: t, type: "msg", sender: auth.currentUser.email, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('msg-input').value = "";
        }
        function addReaction(emoji) { if(activeMsgId) db.collection('chats').doc(activeMsgId).update({ reaction: emoji }); document.getElementById('reaction-picker').style.display='none'; }
        function loadProfiles() { db.collection('settings').doc('profiles').onSnapshot(doc => { if(doc.exists) { const amIArnav = auth.currentUser.email === ARNAV_EMAIL; const pPfp = amIArnav ? doc.data().lovleenPfp : doc.data().arnavPfp; document.getElementById('chat-partner-pfp').src = pPfp || ""; } }); }
    </script>
</body>
</html>
