<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Scientific Calculator</title>
    
    <script>
        window.onerror = function(msg, url, line) {
            alert("Bhai code crash hua hai!\nLine: " + line + "\nError: " + msg);
            return true;
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px); --theme-bg: #000; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: fixed; width: 100%; }

        /* --- CALCULATOR FRONT --- */
        #calc-ui { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; height: 100%; background: #000; z-index: 10; }
        #display { flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; font-size: 65px; padding: 20px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { height: 75px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .num { background: #333; color: white; } .op { background: #f1a33c; color: white; } .top { background: #a5a5a5; color: black; } .zero { grid-column: span 2; border-radius: 40px; }

        /* --- SECRET APP --- */
        #secret-app { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .sos-btn { width: 45px; height: 45px; background: rgba(255, 59, 48, 0.9); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; }

        /* --- LOGIN SCREEN --- */
        #login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-box { width: 85%; padding: 16px; margin-bottom: 12px; background: #1c1c1e; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; outline: none; }
        .login-btn { width: 85%; padding: 16px; background: #007aff; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        /* --- DM LIST --- */
        #dm-list-ui { display: none; flex-direction: column; height: 100%; width: 100%; padding-top: var(--safe-top); }
        .dm-header { padding: 15px 20px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .header-name { font-weight: 700; font-size: 20px; margin-bottom: 5px; }
        .settings-btn { background: #1c1c1e; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 15px; font-size: 14px; cursor: pointer; }
        .search-container { padding: 10px 15px; border-bottom: 1px solid #111; z-index: 9; background: rgba(0,0,0,0.9); }
        .search-bar { width: 100%; padding: 10px 15px; background: #1c1c1e; border-radius: 15px; border: 1px solid #333; color: white; font-size: 14px; outline: none; }
        .dm-item { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #111; }
        .dm-pfp { width: 55px; height: 55px; border-radius: 50%; background: #333; margin-right: 15px; object-fit: cover; }
        .dm-preview { font-size: 14px; color: #8e8e93; margin-top: 4px; }
        .dm-dot { width: 10px; height: 10px; background: #007aff; border-radius: 50%; display: none; }

        /* --- CHAT UI --- */
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--theme-bg); background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; }
        #chat-header { padding: calc(var(--safe-top) + 10px) 15px 12px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10; justify-content: flex-start; }
        .chat-pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 18px; background: rgba(0,0,0,0.5); }
        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .me { align-items: flex-end; } .them { align-items: flex-start; }
        
        /* ALIGNMENT FIX */
        .bubble { 
            padding: 10px 16px; 
            border-radius: 20px; 
            font-size: 15px; 
            line-height: 1.4; 
            position: relative; 
            cursor: pointer; 
            max-width: 75%; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
        }
        .bubble-me { background: #3797f0; color: #fff; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; color: #fff; border-bottom-left-radius: 4px; }
        
        /* IMAGE FIX */
        .chat-img { max-width: 220px; width: 100%; height: auto; border-radius: 12px; margin-bottom: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); object-fit: cover; }
        
        .msg-footer { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #aaa; margin-top: 6px; }
        .react-badge { position: absolute; bottom: -12px; background: #1c1c1e; border: 1px solid #333; padding: 2px 6px; border-radius: 12px; font-size: 13px; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .me .react-badge { right: 10px; } .them .react-badge { left: 10px; }

        #input-bar { padding: 10px 15px calc(var(--safe-bottom) + 10px); display: flex; gap: 10px; border-top: 1px solid #262626; background: rgba(0,0,0,0.9); z-index: 10; align-items: center; }
        #msg-in { flex: 1; padding: 12px 18px; background: #1c1c1e; border: none; border-radius: 25px; color: #fff; font-size: 16px; outline: none; }

        /* --- REACTION TRAY --- */
        #react-tray { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #262626; padding: 15px; border-radius: 20px; flex-direction: column; gap: 12px; z-index: 3000; box-shadow: 0 8px 20px rgba(0,0,0,0.6); min-width: 250px; }
        .emoji-row { display: flex; justify-content: space-between; gap: 10px; }
        .react-emoji { font-size: 26px; cursor: pointer; transition: 0.2s; } .react-emoji:active { transform: scale(1.3); }
        .unsend-btn { background: none; border: none; color: #ff3b30; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; border-top: 1px solid #444; padding-top: 12px; }

        /* --- SETTINGS MODAL --- */
        #settings-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .set-box { width: 90%; background: #1c1c1e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: left; }
        .file-label { color:#aaa; font-size:14px; display:block; margin-bottom:5px; margin-top: 15px; font-weight:bold;}
        .file-upload-btn { width: 100%; padding: 12px; background: #333; color: white; border-radius: 10px; border: none; font-size: 14px; margin-bottom: 5px; }
        .status-badge { color: #4cd964; font-size: 12px; display: block; text-align: center; }
        .delete-chat-btn { width: 100%; padding: 12px; background: rgba(255, 59, 48, 0.2); border: 1px solid #ff3b30; color: #ff3b30; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

    <div id="calc-ui">
        <div id="display">0</div>
        <div class="grid">
            <button class="btn top" onclick="window.handleAC()">AC</button><button class="btn top">+/-</button><button class="btn top">%</button><button class="btn op" onclick="window.press('/')">÷</button>
            <button class="btn num" onclick="window.press('7')">7</button><button class="btn num" onclick="window.press('8')">8</button><button class="btn num" onclick="window.press('9')">9</button><button class="btn op" onclick="window.press('*')">×</button>
            <button class="btn num" onclick="window.press('4')">4</button><button class="btn num" onclick="window.press('5')">5</button><button class="btn num" onclick="window.press('6')">6</button><button class="btn op" onclick="window.press('-')">-</button>
            <button class="btn num" onclick="window.press('1')">1</button><button class="btn num" onclick="window.press('2')">2</button><button class="btn num" onclick="window.press('3')">3</button><button class="btn op" onclick="window.press('+')">+</button>
            <button class="btn num zero" onclick="window.press('0')">0</button><button class="btn num">.</button><button class="btn op" onclick="window.equal()">=</button>
        </div>
    </div>

    <div id="secret-app">

            <h2 style="font-weight: 200; margin-bottom: 20px;">Premium Access</h2>
            <input type="email" id="user-email" class="input-box" placeholder="Email Address">
            <input type="password" id="user-pass" class="input-box" placeholder="Password">
            <button class="login-btn" id="login-btn" onclick="window.checkLogin()">Enter</button>
        </div>

        <div id="dm-list-ui">
            <div class="dm-header">
                <div class="header-info-group"><div class="header-name" id="my-username-display">Loading...</div></div>
                <div style="display:flex; gap:10px;">

                    <div class="sos-btn" onclick="window.forceLogout()">SOS</div>

                    <div class="dm-preview" id="last-msg-preview">Tap to view chat...</div>
                </div>
                <div class="dm-dot" id="unread-dot"></div>
            </div>
        </div>

        <div id="chat-ui">
            <div id="chat-header">
                <button onclick="window.backToList()" style="background:none; border:none; color:#fff; font-size:26px; padding-right:10px; cursor:pointer;">‹</button>
                <img id="chat-pfp" src="" class="chat-pfp">
                <div style="font-weight:700; font-size:16px; margin-left:10px; flex:1;" id="chat-partner-name">...</div>
                <div class="sos-btn" onclick="window.forceLogout()">SOS</div>
            </div>

            <div id="messages"></div>
            <div id="input-bar">
                <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="window.sendPhoto(event)">
                <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:24px; cursor:pointer;">📷</button>
                <input type="text" id="msg-in" placeholder="Message..." onkeypress="if(event.key==='Enter') window.sendMsg()">
                <button onclick="window.sendMsg()" style="background:none; border:none; color:#3797f0; font-weight:bold; font-size:16px; padding-left:5px; cursor:pointer;">Send</button>
            </div>

            <div id="react-tray">
                <div class="emoji-row">
                    <span class="react-emoji" onclick="window.setReact('🥰')">🥰</span>
                    <span class="react-emoji" onclick="window.setReact('😘')">😘</span>
                    <span class="react-emoji" onclick="window.setReact('🫠')">🫠</span>
                    <span class="react-emoji" onclick="window.setReact('🥺')">🥺</span>
                    <span class="react-emoji" onclick="window.setReact('😂')">😂</span>
                    <span class="react-emoji" onclick="window.setReact('😡')">😡</span>
                </div>
                <div id="unsend-wrap" style="display:none; text-align:center;"><button class="unsend-btn" onclick="window.unsendActiveMsg()">🗑️ Unsend Message</button></div>
            </div>
        </div>

            <div class="set-box">
