<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Scientific Calculator</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px); --theme-bg: #000; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; color: #fff; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: fixed; width: 100%; }

        /* --- CALCULATOR --- */
        #calc-ui { width: 100%; max-width: 400px; padding: 20px; display: flex; flex-direction: column; height: 100%; background: #000; z-index: 10; }
        #display { flex: 1; display: flex; align-items: flex-end; justify-content: flex-end; font-size: 65px; padding: 20px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn { height: 75px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .num { background: #333; color: white; } .op { background: #f1a33c; color: white; } .top { background: #a5a5a5; color: black; } .zero { grid-column: span 2; border-radius: 40px; }

        /* --- APP UI --- */
        #secret-app { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .sos-btn { width: 45px; height: 45px; background: rgba(255, 59, 48, 0.9); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 2000; }

        #login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-box { width: 85%; padding: 16px; margin-bottom: 12px; background: #1c1c1e; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; outline: none; }
        .login-btn { width: 85%; padding: 16px; background: #007aff; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        #dm-list-ui { display: none; flex-direction: column; height: 100%; width: 100%; padding-top: var(--safe-top); }
        .dm-header { padding: 15px 20px; border-bottom: 1px solid #262626; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .settings-btn { background: #1c1c1e; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 15px; font-size: 14px; cursor: pointer; }
        .dm-item { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #111; }
        .dm-pfp { width: 55px; height: 55px; border-radius: 50%; background: #333; margin-right: 15px; object-fit: cover; border: 1px solid #222; }
        .dm-dot { width: 10px; height: 10px; background: #007aff; border-radius: 50%; display: none; }

        /* --- CHAT UI --- */
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--theme-bg); background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; }
        #chat-header { padding: calc(var(--safe-top) + 10px) 15px 12px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 10; justify-content: flex-start; }
        
        .search-container { padding: 8px 15px; background: rgba(0,0,0,0.85); border-bottom: 1px solid #262626; z-index: 9; }
        .search-bar { width: 100%; padding: 10px 15px; background: #1c1c1e; border-radius: 15px; border: 1px solid #333; color: white; font-size: 14px; outline: none; }

        #messages { flex: 1; overflow-y: auto; padding: 15px 15px; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.5); }
        
        /* 🚨 THE 100% PERFECT SAFARI BUBBLE 🚨 */
        .msg-wrap { display: flex; width: 100%; align-items: flex-end; }
        .msg-wrap.me { justify-content: flex-end; }
        .msg-wrap.them { justify-content: flex-start; }
        
        .msg-body { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrap.me .msg-body { align-items: flex-end; }
        .msg-wrap.them .msg-body { align-items: flex-start; }

        .bubble-box { 
            padding: 8px 12px; 
            border-radius: 16px; 
            font-size: 15px; 
            line-height: 1.35; 
            word-break: break-word; 
            white-space: pre-wrap; 
            color: #fff;
            cursor: pointer;
            text-align: left;
            position: relative;
            /* 🚨 SAFARI SHRINK HACK 🚨 */
            width: fit-content;
            width: -webkit-fit-content;
            width: -moz-fit-content;
            max-width: 100%;
        }
        .bubble-me { background: #3797f0; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; border-bottom-left-radius: 4px; }
        
        .chat-img { max-width: 220px; max-height: 300px; width: 100%; height: auto; border-radius: 12px; margin-bottom: 2px; object-fit: cover; cursor: pointer; border: 1px solid #333; display: block; }
        .msg-footer { font-size: 10px; color: #888; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
        
        .react-badge { position: absolute; bottom: -10px; background: #1c1c1e; border: 1px solid #333; padding: 1px 5px; border-radius: 10px; font-size: 12px; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .react-me { right: 8px; } 
        .react-them { left: 8px; }
        .react-emoji-display { font-size: 14px; margin-bottom: -2px; }

        #typing-ind { padding: 5px 15px; font-size: 12px; color: #aaa; font-style: italic; display: none; background: rgba(0,0,0,0.5); }
        
        #input-bar { padding: 10px 15px calc(var(--safe-bottom) + 10px); display: flex; gap: 10px; border-top: 1px solid #262626; background: rgba(0,0,0,0.9); z-index: 10; align-items: center; }
        #msg-in { flex: 1; padding: 11px 16px; background: #1c1c1e; border: none; border-radius: 20px; color: #fff; font-size: 16px; outline: none; }

        /* IMAGE VIEWER MODAL */
        #image-viewer { display: none; position: fixed; z-index: 100000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); justify-content: center; align-items: center; flex-direction: column; }
        #full-image { max-width: 95vw; max-height: 85vh; border-radius: 10px; object-fit: contain; }
        .close-viewer { position: absolute; top: calc(var(--safe-top) + 20px); right: 20px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        #react-tray { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #262626; padding: 15px; border-radius: 20px; flex-direction: column; gap: 12px; z-index: 3000; box-shadow: 0 8px 20px rgba(0,0,0,0.6); min-width: 250px; }
        .emoji-row { display: flex; justify-content: space-between; gap: 10px; }
        .react-emoji { font-size: 26px; cursor: pointer; transition: 0.2s; } .react-emoji:active { transform: scale(1.3); }
        .unsend-btn { background: none; border: none; color: #ff3b30; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; border-top: 1px solid #444; padding-top: 12px; }

        #settings-ui { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .set-box { width: 90%; background: #1c1c1e; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: left; }
        .file-label { color:#aaa; font-size:14px; display:block; margin-bottom:5px; margin-top: 15px; font-weight:bold;}
        .file-upload-btn { width: 100%; padding: 12px; background: #333; color: white; border-radius: 10px; border: none; font-size: 14px; margin-bottom: 5px; }
        .delete-chat-btn { width: 100%; padding: 12px; background: rgba(255, 59, 48, 0.2); border: 1px solid #ff3b30; color: #ff3b30; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 25px; }
    </style>
</head>
<body>

    <div id="calc-ui">
        <div id="display">0</div>
        <div class="grid">
            <button class="btn top" onclick="window.handleAC()">AC</button><button class="btn top">+/-</button><button class="btn top">%</button><button class="btn op" onclick="window.press('/')">÷</button>
            <button class="btn num" onclick="window.press('7')">7</button><button class="btn num" onclick="window.press('8')">8</button><button class="btn num" onclick="window.press('9')">9</button><button class="btn op" onclick="window.press('*')">×</button>
            <button class="btn num" onclick="window.press('4')">4</button><button class="btn num" onclick="window.press('5')">5</button><button class="btn num" onclick="window.press('6')">6</button><button class="btn op" onclick="window.press('-')">-</button>
            <button class="btn num" onclick="window.press('1')">1</button><button class="btn num" onclick="window.press('2')">2</button><button class="btn num" onclick="window.press('3')">3</button><button class="btn op" onclick="window.press('+')">+</button>
            <button class="btn num zero" onclick="window.press('0')">0</button><button class="btn num">.</button><button class="btn op" onclick="window.equal()">=</button>
        </div>
    </div>

    <div id="image-viewer" onclick="window.closeImage()">
        <div class="close-viewer">&times;</div>
        <img id="full-image" src="">
    </div>

    <div id="secret-app">
        <div id="login-screen">
            <h2 style="font-weight: 200; margin-bottom: 20px;">Premium Access</h2>
            <input type="email" id="user-email" class="input-box" placeholder="Email Address">
            <input type="password" id="user-pass" class="input-box" placeholder="Password">
            <button class="login-btn" id="login-btn" onclick="window.checkLogin()">Enter</button>
        </div>

        <div id="dm-list-ui">
            <div class="dm-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img id="my-header-pfp" src="" style="width:32px; height:32px; border-radius:50%; object-fit:cover; background:#333; border:1px solid #444;">
                    <div class="header-name" id="my-username-display" style="margin-bottom:0;">Loading...</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="settings-btn" onclick="window.openSettings()">⚙️ Settings</button>
                    <div class="sos-btn" onclick="window.forceLogout()">SOS</div>
                </div>
            </div>
            <div class="search-container"><input type="text" id="dm-search" class="search-bar" placeholder="🔍 Search messages..." oninput="window.searchChat()"></div>
            <div class="dm-item" onclick="window.openChat()">
                <img id="list-pfp" src="" class="dm-pfp">
                <div style="flex:1;">
                    <div class="dm-name" id="partner-username-display">...</div>
                    <div class="dm-preview" id="last-msg-preview">Tap to view chat...</div>
                </div>
                <div class="dm-dot" id="unread-dot"></div>
            </div>
        </div>

        <div id="chat-ui">
            <div id="chat-header">
                <button onclick="window.backToList()" style="background:none; border:none; color:#fff; font-size:26px; padding-right:10px; cursor:pointer;">‹</button>
                <img id="chat-pfp" src="" style="width:35px; height:35px; border-radius:50%; object-fit:cover; border:1px solid #333;">
                <div style="font-weight:700; font-size:16px; margin-left:10px; flex:1;" id="chat-partner-name">...</div>
                <div class="sos-btn" onclick="window.forceLogout()">SOS</div>
            </div>
            
            <div class="search-container">
                <input type="text" id="chat-search" class="search-bar" placeholder="🔍 Search messages in chat..." oninput="window.searchChat()">
            </div>

            <div id="messages"></div>
            <div id="typing-ind">Someone is typing...</div>

            <div id="input-bar">
                <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="window.sendPhoto(event)">
                <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:32px; color:#8e8e93; cursor:pointer; padding:0 8px 4px 0;">+</button>
                <input type="text" id="msg-in" placeholder="Message..." oninput="window.handleTyping()" onkeypress="if(event.key==='Enter') window.sendMsg()">
                <button onclick="window.sendMsg()" style="background:#3797f0; border:none; color:#fff; font-weight:bold; font-size:20px; width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">↑</button>
            </div>

            <div id="react-tray">
                <div class="emoji-row">
                    <span class="react-emoji" onclick="window.setReact('🥰')">🥰</span>
                    <span class="react-emoji" onclick="window.setReact('😘')">😘</span>
                    <span class="react-emoji" onclick="window.setReact('🫠')">🫠</span>
                    <span class="react-emoji" onclick="window.setReact('🥺')">🥺</span>
                    <span class="react-emoji" onclick="window.setReact('😂')">😂</span>
                    <span class="react-emoji" onclick="window.setReact('😡')">😡</span>
                </div>
                <div id="unsend-wrap" style="display:none; text-align:center;"><button class="unsend-btn" onclick="window.unsendActiveMsg()">🗑️ Unsend Message</button></div>
            </div>
        </div>

        <div id="settings-ui">
            <div class="set-box">
                <h3 style="margin-bottom:15px; text-align:center;">App Settings</h3>
                <label class="file-label">Change My PFP:</label>
                <input type="file" id="set-mypfp-file" style="display:none;" accept="image/*" onchange="window.checkFile(this, 'status-mypfp')">
                <button class="file-upload-btn" onclick="document.getElementById('set-mypfp-file').click()">📂 Choose PFP</button>
                <span id="status-mypfp" style="color: #4cd964; font-size: 12px; display: block; text-align: center;"></span>
                
                <label class="file-label">Change Theme:</label>
                <input type="file" id="set-bg-file" style="display:none;" accept="image/*" onchange="window.checkFile(this, 'status-bg')">
                <button class="file-upload-btn" onclick="document.getElementById('set-bg-file').click()">🖼️ Choose Theme</button>
                <span id="status-bg" style="color: #4cd964; font-size: 12px; display: block; text-align: center;"></span>
                
                <button class="login-btn" onclick="window.saveSettings()" style="margin-top:20px; background:#3797f0;">Save Settings</button>
                <button class="delete-chat-btn" onclick="window.confirmDeleteChat()">🗑️ Clear Entire Chat</button>
                <p style="margin-top: 20px; color: #aaa; font-size: 14px; cursor:pointer; text-align:center;" onclick="window.closeSettings()">Cancel</p>
            </div>
        </div>
    </div>

    <script>
        window.exp = '0'; window.taps = 0; window.lastTap = 0;
        window.updateDisplay = function() { document.getElementById('display').innerText = window.exp; }
        window.press = function(v) { if(window.exp === '0') window.exp = v; else window.exp += v; window.updateDisplay(); }
        window.equal = function() { try { window.exp = eval(window.exp).toString(); window.updateDisplay(); } catch (e) { window.exp = 'Error'; window.updateDisplay(); } }
        window.handleAC = function() {
            let now = Date.now();
            if (now - window.lastTap < 600) { window.taps++; } else { window.taps = 1; }
            window.lastTap = now;
            if (window.taps === 3) { document.getElementById('secret-app').style.display = 'flex'; document.getElementById('calc-ui').style.display = 'none'; window.taps = 0; }
            window.exp = '0'; window.updateDisplay();
        }

        window.SUPABASE_URL = "https://qrsgyerhotxwhldmtqec.supabase.co"; 
        window.SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2d5ZXJob3R4d2hsZG10cWVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1Nzc5NzIsImV4cCI6MjA4OTE1Mzk3Mn0.Bw-zuZr4lJ4RaAMyNVbfixZoWpOR5kR4V2LY-zERvfo"; 
        
        window.supabaseClient = null;
        window.myChannel = null;
        window.typingTimer = null;
        window.syncEngine = null;
        window.chatData = []; window.activeMsgId = null; window.currentUser = ''; window.partnerUser = ''; window.isChatOpen = false;
        
        window.justSentByMe = false; 
        window.lastHash = ''; 
        window.forceRender = true;

        try { window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY); } catch(e) {}

        window.checkLogin = async function() {
            if(!window.supabaseClient) { alert("Backend load nahi hua."); return; }
            let email = document.getElementById('user-email').value.trim().toLowerCase();
            let pass = document.getElementById('user-pass').value;
            let btn = document.getElementById('login-btn');

            if(!email || !pass) return; 
            btn.innerText = "Checking...";

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email: email, password: pass });

            if (error) { alert("No Maths premium notes subscription found"); btn.innerText = "Enter"; return; }

            if (email === "houston@boobie.com") { window.currentUser = 'ahrnavsharma'; window.partnerUser = 'lovleenx'; } 
            else if (email === "pcw69@boobie.com") { window.currentUser = 'lovleenx'; window.partnerUser = 'ahrnavsharma'; } 
            
            document.getElementById('my-username-display').innerText = window.currentUser;
            document.getElementById('partner-username-display').innerText = window.partnerUser;
            document.getElementById('chat-partner-name').innerText = window.partnerUser;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dm-list-ui').style.display = 'flex';
            
            window.loadSettings(); 
            window.fetchMessages(); 
            window.setupRealtime(); 
            btn.innerText = "Enter";
        }

        window.fetchMessages = async function() {
            const { data, error } = await window.supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
            if (data) { window.chatData = data; window.renderMessages(); }
        }

        window.setupRealtime = function() {
            window.myChannel = window.supabaseClient.channel('global-chat', { config: { broadcast: { self: false } } });
            
            window.myChannel.on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                window.fetchMessages(); 
                
                if(payload.eventType === 'INSERT' && payload.new.sender !== window.currentUser) {
                    if (window.isChatOpen) {
                        window.markMessagesAsSeen(); // Auto seen if chat is open
                    } else {
                        document.getElementById('unread-dot').style.display = 'block';
                    }
                }
            })
            .on('broadcast', { event: 'typing' }, payload => {
                if (payload.payload.user !== window.currentUser) {
                    let ind = document.getElementById('typing-ind');
                    ind.style.display = 'block';
                    ind.innerText = window.partnerUser + " is typing...";
                    clearTimeout(window.typingTimer);
                    window.typingTimer = setTimeout(() => { ind.style.display = 'none'; }, 2500);
                    window.scrollToBottom();
                }
            })
            .subscribe();
        }

        window.handleTyping = function() {
            if(window.myChannel) { window.myChannel.send({ type: 'broadcast', event: 'typing', payload: { user: window.currentUser } }); }
        }

        window.getTime = function() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        window.sendMsg = async function() {
            let i = document.getElementById('msg-in'); 
            let text = i.value.trim();
            if(!text) return;
            i.value = ''; 
            
            window.justSentByMe = true; 
            window.forceRender = true;
            await window.supabaseClient.from('messages').insert([{ text: text, sender: window.currentUser, time: window.getTime(), react: "", type: "text", seen: false }]);
            window.fetchMessages(); 
        }

        window.sendPhoto = function(event) {
            const file = event.target.files[0]; 
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 600; 
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE/w; w = MAX_SIZE; } } else { if (h > MAX_SIZE) { w *= MAX_SIZE/h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const base64Img = canvas.toDataURL('image/jpeg', 0.5); 
                    
                    window.justSentByMe = true; 
                    window.forceRender = true;
                    await window.supabaseClient.from('messages').insert([{ text: base64Img, sender: window.currentUser, time: window.getTime(), react: "", type: "img", seen: false }]);
                    window.fetchMessages();
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        window.imgClickTimer = null;
        window.handleImageClick = function(event, id, src) {
            event.stopPropagation();
            if (window.imgClickTimer) {
                clearTimeout(window.imgClickTimer); window.imgClickTimer = null;
                document.getElementById('full-image').src = src;
                document.getElementById('image-viewer').style.display = 'flex';
            } else {
                window.imgClickTimer = setTimeout(() => { window.imgClickTimer = null; window.openReact(id); }, 250); 
            }
        }
        window.closeImage = function() { document.getElementById('image-viewer').style.display = 'none'; }

        window.searchChat = function() { 
            window.forceRender = true;
            window.renderMessages(document.getElementById('chat-search').value); 
        }

        window.renderMessages = function(query = '') {
            // 🚨 SMART SYNC: Only update DOM if new message/seen/react arrived 🚨
            let newHash = window.chatData.map(m => m.id + '' + m.seen + '' + m.react).join('') + query;
            if (window.lastHash === newHash && !window.forceRender) return;
            window.lastHash = newHash;
            window.forceRender = false;

            let container = document.getElementById('messages'); 
            let isAtBottom = container.scrollTop >= (container.scrollHeight - container.offsetHeight - 100);
            
            container.innerHTML = '';
            
            let filtered = window.chatData.filter(m => {
                if (query === '') return true;
                if (m.type === 'text') return m.text.toLowerCase().includes(query.toLowerCase());
                return false; 
            });
            
            filtered.forEach((m) => {
                let isMe = m.sender === window.currentUser; 
                let content = m.type === 'img' ? `<img src="${m.text}" class="chat-img" onclick="window.handleImageClick(event, ${m.id}, '${m.text}')">` : m.text;
                let pfpSrc = !isMe ? (localStorage.getItem(window.partnerUser + '_pfp') || `https://ui-avatars.com/api/?name=${window.partnerUser.charAt(0)}&background=random`) : '';

                container.innerHTML += `
                    <div class="msg-wrap ${isMe ? 'me' : 'them'}">
                        ${!isMe ? `<img src="${pfpSrc}" style="width:28px; height:28px; border-radius:50%; object-fit:cover; margin-right:8px; align-self:flex-end; border:1px solid #333;">` : ''}
                        
                        <div class="msg-body">
                            
                            <div class="bubble-box ${isMe ? 'bubble-me' : 'bubble-them'}" style="${m.type === 'img' ? 'background:transparent; padding:0;' : ''}" onclick="window.openReact(${m.id})">
                                ${content}
                            </div>
                            
                            <div class="msg-footer" style="justify-content: ${isMe ? 'flex-end' : 'flex-start'};">
                                ${m.react ? `<span class="react-emoji-display">${m.react}</span>` : ''}
                                <span>${m.time}${isMe && m.seen ? ' • Seen' : ''}</span>
                            </div>
                        </div>
                    </div>`;
            });
            
            if(window.chatData.length > 0) {
                let lastMsg = window.chatData[window.chatData.length - 1];
                document.getElementById('last-msg-preview').innerText = lastMsg.type === 'img' ? "📷 Photo" : lastMsg.text.substring(0, 20) + "...";
            } else {
                document.getElementById('last-msg-preview').innerText = "Tap to view chat...";
            }
            
            if (window.justSentByMe || isAtBottom) { 
                setTimeout(() => { window.scrollToBottom(); }, 100);
                window.justSentByMe = false; 
            }
        }

        window.openReact = function(id) { 
            window.activeMsgId = id; 
            let m = window.chatData.find(x => x.id === id); 
            document.getElementById('unsend-wrap').style.display = (m && m.sender === window.currentUser) ? 'block' : 'none'; 
            document.getElementById('react-tray').style.display = 'flex'; 
        }
        
        window.onclick = function(e) { 
            if(!e.target.closest('.bubble-box') && !e.target.closest('#react-tray') && !e.target.closest('.chat-img')) { 
                document.getElementById('react-tray').style.display='none'; 
            } 
        };
        
        window.scrollToBottom = function() { let m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

        window.unsendActiveMsg = async function() { 
            document.getElementById('react-tray').style.display = 'none'; 
            await window.supabaseClient.from('messages').delete().eq('id', window.activeMsgId); 
            window.forceRender = true;
            window.fetchMessages();
        }
        
        window.setReact = async function(emoji) { 
            document.getElementById('react-tray').style.display = 'none'; 
            await window.supabaseClient.from('messages').update({ react: emoji }).eq('id', window.activeMsgId); 
            window.forceRender = true;
            window.fetchMessages();
        }
        
        window.confirmDeleteChat = async function() { 
            if(confirm("Delete chat? Yeh wapas nahi aayegi.")) { 
                await window.supabaseClient.from('messages').delete().neq('id', 0); 
                window.closeSettings(); 
                window.forceRender = true;
                window.fetchMessages();
            } 
        }
        
        window.markMessagesAsSeen = async function() {
            const unseenIds = window.chatData.filter(m => m.sender === window.partnerUser && !m.seen).map(m => m.id);
            if(unseenIds.length > 0) {
                await window.supabaseClient.from('messages').update({ seen: true }).in('id', unseenIds);
                window.fetchMessages();
            }
        }

        window.openChat = function() { 
            document.getElementById('dm-list-ui').style.display='none'; 
            document.getElementById('chat-ui').style.display='flex'; 
            document.getElementById('unread-dot').style.display='none'; 
            window.isChatOpen=true; 
            window.markMessagesAsSeen(); 
            
            // Humesha neechay scroll karo jab chat khule
            setTimeout(() => { window.scrollToBottom(); }, 100);
            
            // 🚨 BACKUP SYNC ENGINE (Har 3 second mein check) 🚨
            window.syncEngine = setInterval(() => {
                window.fetchMessages();
                if(window.isChatOpen) window.markMessagesAsSeen();
            }, 3000); 
        }
        
        window.backToList = function() { 
            document.getElementById('chat-ui').style.display='none'; 
            document.getElementById('dm-list-ui').style.display='flex'; 
            window.isChatOpen = false; 
            clearInterval(window.syncEngine); 
        }
        
        window.forceLogout = async function() { if(window.supabaseClient) await window.supabaseClient.auth.signOut(); location.reload(); }
        window.openSettings = function() { document.getElementById('settings-ui').style.display='flex'; }
        window.closeSettings = function() { document.getElementById('settings-ui').style.display='none'; }
        window.checkFile = function(input, statusId) { if(input.files && input.files[0]) document.getElementById(statusId).innerText = "✅ Selected"; }

        window.compressAndSave = function(file, storageKey) {
            if (!file) return; const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image(); img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 800; let w = img.width, h = img.height;
                    if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE/w; w = MAX_SIZE; } } else { if (h > MAX_SIZE) { w *= MAX_SIZE/h; h = MAX_SIZE; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    try { localStorage.setItem(storageKey, canvas.toDataURL('image/jpeg', 0.6)); window.loadSettings(); } catch(err) { }
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        window.saveSettings = function() {
            if(document.getElementById('set-mypfp-file').files[0]) window.compressAndSave(document.getElementById('set-mypfp-file').files[0], window.currentUser + '_pfp');
            if(document.getElementById('set-bg-file').files[0]) window.compressAndSave(document.getElementById('set-bg-file').files[0], 'chatBg');
            window.closeSettings(); document.getElementById('set-mypfp-file').value = ''; document.getElementById('set-bg-file').value = '';
        }

        window.loadSettings = function() {
            const partnerPfpData = localStorage.getItem(window.partnerUser + '_pfp'); 
            const myPfpData = localStorage.getItem(window.currentUser + '_pfp'); 
            const bgData = localStorage.getItem('chatBg');
            const defaultPartner = `https://ui-avatars.com/api/?name=${window.partnerUser.charAt(0)}&background=random`;
            const defaultMe = `https://ui-avatars.com/api/?name=${window.currentUser.charAt(0)}&background=random`;
            
            document.getElementById('list-pfp').src = partnerPfpData ? partnerPfpData : defaultPartner;
            document.getElementById('chat-pfp').src = partnerPfpData ? partnerPfpData : defaultPartner;
            document.getElementById('my-header-pfp').src = myPfpData ? myPfpData : defaultMe;
            if(bgData) document.documentElement.style.setProperty('--theme-bg', `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${bgData}')`); 
        }
    </script>
</body>
</html>
