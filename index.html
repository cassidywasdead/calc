<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notes App</title> <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* IG Dark Theme Vibe */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000000; color: #ffffff; margin: 0; padding: 0; overflow: hidden; }
        .container { max-width: 500px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Login Screen - Minimalist */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; }
        #login-screen h2 { font-size: 24px; font-weight: 600; margin-bottom: 30px; letter-spacing: 1px; }
        input { width: 85%; padding: 14px 20px; margin: 10px 0; background-color: #121212; border: 1px solid #262626; border-radius: 8px; color: white; outline: none; font-size: 15px; }
        input::placeholder { color: #8e8e8e; }
        button.login-btn { width: 85%; padding: 14px; background: linear-gradient(135deg, #833ab4, #5b51d8); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        
        /* Chat Screen */
        #chat-screen { display: none; flex-direction: column; height: 100%; background-color: #000000; }
        
        /* Header */
        #header { padding: 15px 20px; border-bottom: 1px solid #262626; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; background: #000000; z-index: 10; }
        
        /* Messages Area */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { padding: 10px 16px; border-radius: 22px; max-width: 75%; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
        
        /* IG Purple-Blue Gradient for Your Messages */
        .my-msg { background: linear-gradient(135deg, #b026ff, #0d6efd); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        
        /* Dark Grey for Partner's Messages */
        .their-msg { background-color: #262626; align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        
        /* Input Area */
        #input-area { padding: 10px 15px 20px 15px; background: #000000; display: flex; gap: 10px; align-items: center; border-top: 1px solid #262626; }
        #msg-input { flex: 1; padding: 12px 20px; background-color: #262626; border: none; border-radius: 24px; color: white; outline: none; font-size: 15px; margin: 0; }
        #send-btn { background: transparent; color: #0d6efd; border: none; font-weight: 600; font-size: 16px; padding: 0 10px; cursor: pointer; }
        
        /* Movable SOS Button */
        #sos-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: none; /* Chat open hone par dikhega */
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.4);
            z-index: 9999;
            touch-action: none; /* Required for dragging */
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="sos-btn" onclick="triggerSOS()">SOS</div>

        <div id="login-screen">
            <h2>Log In</h2>
            <input type="email" id="email" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="login-btn" onclick="login()">Log In</button>
            <p id="error-msg" style="color: #ff3b30; font-size: 14px; display: none; margin-top: 15px;">Incorrect username or password.</p>
        </div>

        <div id="chat-screen">
            <div id="header">
                <span>Direct Messages</span>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="Message..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // --- ⚠️ YAHAN APNI FIREBASE KEYS PASTE KARNA ⚠️ ---
        const firebaseConfig = {
    apiKey: "AIzaSyBCrx5hqoBFAR9VDNJ4opUBp3hTuL3bGJ4",
    authDomain: "secretspace-ca604.firebaseapp.com",
    projectId: "secretspace-ca604",
    storageBucket: "secretspace-ca604.firebasestorage.app",
    messagingSenderId: "440793813496",
    appId: "1:440793813496:web:405615f2dc570b296b460d",
    measurementId: "G-2N4RWH4VK0"
  };
        // ----------------------------------------------------

        // Initialize Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Check Login Status
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('sos-btn').style.display = 'flex';
                loadMessages();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
                document.getElementById('sos-btn').style.display = 'none';
            }
        });

        // Login Function
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password)
                .catch(error => { document.getElementById('error-msg').style.display = 'block'; });
        }

        // --- SOS / Decoy Function ---
        function triggerSOS() {
            auth.signOut().then(() => {
                // Logout hote hi seedha Google Calculator pe redirect
                window.location.replace("https://www.google.com/search?q=calculator");
            });
        }

        // Send Message
        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if (text.trim() === "") return;

            db.collection('chats').add({
                text: text,
                sender: auth.currentUser.email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msg-input').value = "";
        }

        // Enter press karne pe message send ho
        function handleKeyPress(event) {
            if (event.key === "Enter") { sendMessage(); }
        }

        // Load Messages Live
        function loadMessages() {
            db.collection('chats').orderBy('timestamp').onSnapshot(snapshot => {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    // Check if message is mine or partner's
                    if (data.sender === auth.currentUser.email) {
                        div.className = 'msg my-msg';
                    } else {
                        div.className = 'msg their-msg';
                    }
                    div.innerText = data.text;
                    messagesDiv.appendChild(div);
                });
                // Auto scroll to bottom
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // --- Make SOS Button Draggable for Touch Screens (iPhone) ---
        const sosBtn = document.getElementById('sos-btn');
        let isDragging = false;
        let offsetX, offsetY;

        sosBtn.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            const rect = sosBtn.getBoundingClientRect();
            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            sosBtn.style.left = (touch.clientX - offsetX) + 'px';
            sosBtn.style.top = (touch.clientY - offsetY) + 'px';
            // Disable default right/left positioning so dragging works smoothly
            sosBtn.style.right = 'auto'; 
        });

        document.addEventListener('touchend', () => { isDragging = false; });
    </script>
</body>
</html>
